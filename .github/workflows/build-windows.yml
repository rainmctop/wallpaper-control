name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc
    
    - name: Build release
      run: |
        cd wallpaper_fetcher
        cargo build --release --target x86_64-pc-windows-msvc
    
    - name: Create release directory
      run: |
        mkdir -p release
        cp wallpaper_fetcher/target/x86_64-pc-windows-msvc/release/wallpaper_fetcher.exe release/
        cp wallpaper_fetcher/README.md release/ 2>$null || echo "No README found"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wallpaper-fetcher-windows
        path: release/
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release/wallpaper_fetcher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
